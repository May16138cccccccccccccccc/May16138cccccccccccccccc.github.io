# ==============================
# 🌟 核心主题配置
# ==============================
theme: jekyll-theme-bef  # 必须准确匹配主题名称
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# ==============================
# 🌟 站点基础信息
# ==============================
title: "太极键程开发者"  # 使用之前精选的小组名称
description: "程序员 × 太极 × 化妆师 × 作家的跨界共生社区"
logo: assets/images/logo.png  # 确保图片路径正确
url: "https://yourusername.github.io"  # 生产环境地址
baseurl: "/bef"  # 如果部署在仓库根目录则留空""

# ==============================
# 🌟 Bef主题专属配置
# ==============================
# 导航菜单 (需创建对应md文件)
navigation:
  - title: 代码道场
    url: /code-dojo/
  - title: 跨界日志
    url: /cross-log/
  - title: 妆点算法
    url: /makeup-algo/
  - title: 技术咏春
    url: /tech-wingchun/

# 社交链接 (按需开启)
social_links:
  - name: GitHub
    icon: github
    url: https://github.com/yourusername
  - name: CSDN
    icon: rss  # 使用近似图标
    url: https://blog.csdn.net/yourid
  - name: 豆瓣小组
    icon: users
    url: https://www.douban.com/group/yourgroup

# ==============================
# 🌟 作者信息强化
# ==============================
author:
  name: cm
  bio: "全栈开发者 | 青羊宫太极弟子 | 非遗数字化志愿者"
  avatar: /assets/images/avatar.jpg  # 200x200像素最佳
  links:
    - label: "📚 技术博客"
      url: https://blog.csdn.net/yourid
    - label: "🎭 文化志愿"
      url: /volunteer

# ==============================
# 🌟 增强功能配置
# ==============================
# 评论区配置
disqus:
  shortname: your-disqus-shortname

# 定制化搜索
search: true
search_provider: simple  # 适合技术文档的轻量搜索

# 特色模块开关
feature:
  dark_mode: true  # 启用夜间模式
  mathjax: false   # 技术文档需要时可开启

# ==============================
# 🌟 资源加载优化
# ==============================
sass:
  style: compressed  # 压缩CSS文件

# ==============================
# 部署前检查清单
# ==============================
# 1. 确认已创建以下目录结构：
#    ├── _pages
#    │   ├── code-dojo.md
#    │   ├── cross-log.md 
#    │   └── ...
#    ├── assets
#    │   ├── images
#    │   │   ├── logo.png
#    │   │   └── avatar.jpg
#    │   └── videos
#    │       └── mountains.mp4
#
# 2. 运行安装命令：
#    bundle add jekyll-theme-bef
#    bundle install
#
# 3. 本地测试命令：
#    bundle exec jekyll serve --livereload
